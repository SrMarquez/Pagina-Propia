<main class="container py-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Contacto</h1>
        <p class="text-secondary">¿Tienes un proyecto? Hablemos.</p>
    </div>

    <div class="row justify-content-center align-items-center g-5">

        <div class="col-md-5">
            <h3 class="mb-3">Información</h3>
            <p class="text-secondary">
                Puedes contactarme para desarrollo web, aplicaciones o proyectos e-commerce.
            </p>

            <p><strong>Email:</strong> marquezsr0@gmail.com</p>
            <p><strong>Ubicación:</strong> CDMX, México</p>

            <a href="redes.html" class="btn btn-outline-info mt-3">
                Redes
            </a>
        </div>

        <div class="col-md-6">
            <form class="p-4 rounded bg-body-secondary shadow">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" placeholder="Tu nombre">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Teléfono</label>
                        <input type="number" class="form-control" placeholder="Tu número">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" placeholder="Tu correo">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Mensaje</label>
                        <textarea class="form-control" rows="4"></textarea>
                    </div>

                </div>

                <div class="text-end mt-3">
                    <button class="btn btn-info">Enviar</button>
                </div>

            </form>
        </div>

    </div>

</main>
